name: Generate Trip APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Initialize Android Project Files
        run: |
          mkdir -p app/src/main/java/com/travel/kannurwayanad
          
          # Force move MainActivity to correct folder if misplaced
          if [ -f MainActivity.kt ]; then
            mv MainActivity.kt app/src/main/java/com/travel/kannurwayanad/MainActivity.kt
          fi

          # Create Android Manifest
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.travel.kannurwayanad">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="Trip Companion" android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # CORRECTED: Added pluginManagement block to tell Gradle to find Android plugins in Google's servers
          cat << 'EOF' > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include(":app")
          EOF
          
          # Create root build.gradle.kts
          cat << 'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.1.1" apply false
              id("org.jetbrains.kotlin.android") version "1.8.10" apply false
          }
          EOF

          # Create app build.gradle.kts
          cat << 'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.travel.kannurwayanad"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.travel.kannurwayanad"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              buildFeatures { compose = true }
              composeOptions { kotlinCompilerExtensionVersion = "1.4.3" }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation(platform("androidx.compose:compose-bom:2023.08.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.material3:material3:1.2.0")
          }
          EOF

      # Setup Gradle 8.2 environment
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      # Run compile task using global gradle binary
      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripCompanion-APK
          path: app/build/outputs/apk/debug/*.apk
